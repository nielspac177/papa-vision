# EfficientNet-B0, ImageNet-pretrained. Backbone frozen; only the new classifier
# head is trained.
model: efficientnet_b0

dropout: 0.3
pretrained: true
freeze_backbone: true

img_size: 128
batch_size: 32
val_frac: 0.15
test_frac: 0.15
split_seed: 42
aug_strength: 1.0

epochs: 15
lr: 0.001
weight_decay: 0.0001
optimizer: adamw
scheduler: cosine
label_smoothing: 0.05
patience: 6

device: auto
deterministic: true
